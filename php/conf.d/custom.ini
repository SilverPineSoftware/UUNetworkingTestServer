; Bref Lambda: extra PHP settings (auto-loaded from php/conf.d/*.ini on deploy).
; See https://bref.sh/docs/environment/php

; Stop PHP from auto-adding Content-Type: text/html; charset=UTF-8 when the app
; does not call header('Content-Type: ...'). Lets endpoints like /test/empty
; return 200 with a zero-byte body and no Content-Type (when setResult omits it).
default_mimetype =
default_charset =
